name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build – ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: VoiceMorph-Windows.exe
            pyinstaller_args: "--onefile --windowed --name VoiceMorph --collect-all pedalboard"

          - os: macos-latest
            artifact_name: VoiceMorph-macOS
            pyinstaller_args: "--onefile --windowed --name VoiceMorph --collect-all pedalboard"

          - os: ubuntu-latest
            artifact_name: VoiceMorph-Linux
            pyinstaller_args: "--onefile --name VoiceMorph --collect-all pedalboard"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Linux – System-Abhängigkeiten installieren
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            portaudio19-dev \
            libgirepository1.0-dev \
            libglib2.0-dev \
            libasound2-dev \
            espeak-ng \
            libqt6gui6 \
            libxcb-cursor0

      - name: Python-Pakete installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: macOS – Quarantine-Flag entfernen (falls nötig)
        if: runner.os == 'macOS'
        run: |
          # Sicherstellen dass PyInstaller-Binaries ausführbar sind
          find /usr/local/lib -name "*.dylib" -exec xattr -d com.apple.quarantine {} + 2>/dev/null || true

      - name: Build mit PyInstaller
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} src/main.py

      - name: Binärdatei umbenennen (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Move-Item "dist\VoiceMorph.exe" "dist\${{ matrix.artifact_name }}"

      - name: Binärdatei umbenennen (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          mv "dist/VoiceMorph" "dist/${{ matrix.artifact_name }}"

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: GitHub Release erstellen
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Artifacts herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Release erstellen & Dateien hochladen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "TmYNoobs VoiceMorph ${{ github.ref_name }}"
          body: |
            ## 🎤 TmYNoobs VoiceMorph & Text2Speech – ${{ github.ref_name }}

            ### Downloads

            | Plattform | Datei |
            |---|---|
            | 🪟 Windows | `VoiceMorph-Windows.exe` – direkt doppelklicken |
            | 🍎 macOS   | `VoiceMorph-macOS` – Terminal: `chmod +x VoiceMorph-macOS && ./VoiceMorph-macOS` |
            | 🐧 Linux   | `VoiceMorph-Linux` – Terminal: `chmod +x VoiceMorph-Linux && ./VoiceMorph-Linux` |

            ### Alternativ: Mit Python starten
            ```bash
            git clone https://github.com/TmYNooB/VoiceMorph-TTS.git
            cd VoiceMorph-TTS
            # Windows:
            start.bat
            # macOS/Linux:
            bash start.sh
            ```

            ---
            Vollständige Anleitung: [README.md](https://github.com/TmYNooB/VoiceMorph-TTS#readme)
          files: |
            artifacts/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
